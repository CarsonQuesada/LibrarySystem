<!doctype html>
<html>
  <head>
    <title>Library</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-4">
    {% if current_user %}
    <nav class="mb-4 d-flex justify-content-between align-items-center">
      <!-- LEFT SIDE -->
      <div>
        <a href="/" class="btn btn-primary">Home</a>
        <a href="/account" class="btn btn-secondary">Account</a>

        {% if current_user.is_librarian %}
        <a href="/admin/books/add" class="btn btn-success">Add Book</a>
        <a href="/admin/loans" class="btn btn-info">View Loans</a>
        {% endif %}

        <a href="/logout" class="btn btn-danger">Logout</a>
      </div>

      <!-- RIGHT SIDE -->
      <div>
        <span class="me-2 fw-bold">
          {{ current_user.name }} {% if current_user.is_librarian %} (Admin) {%
          else %} (User) {% endif %}
        </span>
      </div>
    </nav>
    {% endif %} {% block content %}{% endblock %}
  </body>
</html>
