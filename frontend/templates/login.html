{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 75vh;">
  <div class="w-100" style="max-width: 420px;">
    
    <div class="text-center mb-4">
      <h1 class="h3 mb-2">Library System</h1>
      <p class="text-muted mb-0">Sign in to access your account.</p>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h2 class="h5 mb-4 text-center">Login</h2>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" required />
          </div>

          <div class="d-grid mb-3">
            <button class="btn btn-primary">Login</button>
          </div>
        </form>

        <div class="text-center">
          <p class="text-muted mb-2">Don't have an account?</p>
          <a href="/register" class="btn btn-outline-secondary btn-sm">
            Create Account
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
