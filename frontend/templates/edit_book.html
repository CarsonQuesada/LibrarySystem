{% extends "base.html" %} {% block content %}

<h2>Edit Book</h2>

<form method="POST" class="mt-3">
  <div class="mb-3">
    <label>Title</label>
    <input
      name="title"
      class="form-control"
      value="{{ book.title }}"
      required
    />
  </div>

  <div class="mb-3">
    <label>Author</label>
    <input
      name="author"
      class="form-control"
      value="{{ book.author }}"
      required
    />
  </div>

  <div class="mb-3">
    <label>ISBN</label>
    <input name="isbn" class="form-control" value="{{ book.isbn }}" />
  </div>

  <div class="mb-3">
    <label>Copy Count</label>
    <input
      name="copy_count"
      type="number"
      class="form-control"
      value="{{ book.copy_count }}"
      required
    />
  </div>

  <button class="btn btn-primary">Save Changes</button>
  <a href="/admin/dashboard" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
