{% extends "base.html" %}
{% block title %}Add Book{% endblock %}

{% block content %}

<div class="mb-4">
  <h2 class="mb-1">Add Book</h2>
  <p class="text-muted mb-0">
    Enter the details for a new book in the catalog.
  </p>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="POST" action="/admin/books/add">
      <div class="row g-3">
        <div class="col-md-6">
          <label for="title" class="form-label">Title</label>
          <input
            id="title"
            name="title"
            type="text"
            class="form-control"
            required
          />
        </div>

        <div class="col-md-6">
          <label for="author" class="form-label">Author</label>
          <input
            id="author"
            name="author"
            type="text"
            class="form-control"
            required
          />
        </div>

        <div class="col-md-6">
          <label for="isbn" class="form-label">ISBN</label>
          <input
            id="isbn"
            name="isbn"
            type="text"
            class="form-control"
          />
        </div>

        <div class="col-md-3">
          <label for="copy_count" class="form-label">Copy Count</label>
          <input
            id="copy_count"
            name="copy_count"
            type="number"
            min="0"
            class="form-control"
            required
          />
        </div>

        <div class="col-md-3">
          <label for="available_copies" class="form-label">Available Copies</label>
          <input
            id="available_copies"
            name="available_copies"
            type="number"
            min="0"
            class="form-control"
            required
          />
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">Add Book</button>
        <a href="/admin/dashboard" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
