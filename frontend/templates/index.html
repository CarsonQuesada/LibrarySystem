{% extends "base.html" %} {% block content %}

<h2>Books</h2>

<table class="table">
  <tr>
    <th>Title</th>
    <th>Author</th>
    <th>Available</th>
    <th>Action</th>
  </tr>

  {% for book in books %}
  <tr>
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.available_copies }}</td>
    <td>
      <a href="/borrow/{{ book.id }}" class="btn btn-primary">Borrow</a>
    </td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
